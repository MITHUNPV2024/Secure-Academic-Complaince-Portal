<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Compliance Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px; margin: 100px auto; }
        .login-box h1 { text-align: center; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
        .btn-primary:hover { opacity: 0.9; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .dashboard { background: white; padding: 30px; border-radius: 20px; margin-top: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); transition: 0.3s; }
        .stat-number { font-size: 36px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-present { background: #28a745; color: white; }
        .badge-absent { background: #dc3545; color: white; }
        .hidden { display: none; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .alert-danger { background: #f8d7da; color: #721c24; }
        .test-creds { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let currentUser = null;
        let token = null;

        function render() {
            const app = document.getElementById('app');
            if (!currentUser) {
                app.innerHTML = `
                    <div class="login-box">
                        <h1>🎓 Academic Compliance Portal</h1>
                        <div id="error" class="alert alert-danger hidden"></div>
                        <form onsubmit="login(event)">
                            <div class="form-group">
                                <label>📧 Email</label>
                                <input type="email" id="email" required>
                            </div>
                            <div class="form-group">
                                <label>🔒 Password</label>
                                <input type="password" id="password" required>
                            </div>
                            <button type="submit" class="btn-primary">🚀 Login</button>
                        </form>
                        <div class="test-creds">
                            <strong>Test Credentials:</strong><br>
                            👨💼 Admin: admin@college.edu / admin123<br>
                            👨🏫 Faculty: john@college.edu / admin123<br>
                            👨🎓 Student: alice@college.edu / admin123
                        </div>
                    </div>
                `;
            } else {
                if (currentUser.role === 'admin') renderAdminDashboard();
                else if (currentUser.role === 'faculty') renderFacultyDashboard();
                else if (currentUser.role === 'student') renderStudentDashboard();
            }
        }

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = data.user;
                    token = data.token;
                    render();
                } else {
                    document.getElementById('error').textContent = data.message;
                    document.getElementById('error').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('error').textContent = 'Login failed';
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function logout() {
            currentUser = null;
            token = null;
            render();
        }

        async function renderAdminDashboard() {
            const stats = await fetchData('/admin/stats');
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="navbar">
                    <div>🎓 Academic Portal - Admin</div>
                    <div>
                        <span>👨💼 ${currentUser.name}</span>
                        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
                    </div>
                </div>
                <div class="container">
                    <div class="dashboard">
                        <h2>📊 Admin Dashboard</h2>
                        <div class="stats-grid">
                            <div class="stat-card" onclick="showUsers()">
                                <h3>👥 Total Users</h3>
                                <div class="stat-number">${stats.totalUsers || 0}</div>
                            </div>
                            <div class="stat-card" onclick="showCompliance()">
                                <h3>👨🎓 Total Students</h3>
                                <div class="stat-number">${stats.totalStudents || 0}</div>
                            </div>
                            <div class="stat-card" onclick="showCourses()">
                                <h3>📚 Total Courses</h3>
                                <div class="stat-number">${stats.totalCourses || 0}</div>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 20px 0;">
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showAddUser()">
                                <h3 style="color: #667eea;">➕ Add User</h3>
                                <p>Add Faculty or Student</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showDepartments()">
                                <h3 style="color: #667eea;">🏢 Departments</h3>
                                <p>Manage Departments</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showAllAttendance()">
                                <h3 style="color: #667eea;">📅 View Attendance</h3>
                                <p>All attendance records</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showAllMarks()">
                                <h3 style="color: #667eea;">📊 View Marks</h3>
                                <p>All internal marks</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showAdminCompliance()">
                                <h3 style="color: #667eea;">📋 Compliance Report</h3>
                                <p>Generate compliance report</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="downloadComplianceReport()">
                                <h3 style="color: #667eea;">💾 Download Report</h3>
                                <p>Export compliance data</p>
                            </div>
                        </div>
                        <div id="content"></div>
                    </div>
                </div>
            `;
        }

        async function renderFacultyDashboard() {
            const stats = await fetchData('/faculty/stats');
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="navbar">
                    <div>🎓 Academic Portal - Faculty</div>
                    <div>
                        <span>👨🏫 ${currentUser.name}</span>
                        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
                    </div>
                </div>
                <div class="container">
                    <div class="dashboard">
                        <h2>📖 Faculty Dashboard</h2>
                        <div class="stats-grid">
                            <div class="stat-card" onclick="showCourses()">
                                <h3>📚 Total Courses</h3>
                                <div class="stat-number">${stats.totalCourses || 0}</div>
                            </div>
                            <div class="stat-card" onclick="showStudentCompliance()">
                                <h3>👨🎓 Total Students</h3>
                                <div class="stat-number">${stats.totalStudents || 0}</div>
                            </div>
                            <div class="stat-card">
                                <h3>📝 Total Assignments</h3>
                                <div class="stat-number">${stats.totalAssignments || 0}</div>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 20px 0;">
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showUploadAttendance()">
                                <h3 style="color: #667eea;">📅 Upload Attendance</h3>
                                <p>Mark student attendance</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showUploadMarks()">
                                <h3 style="color: #667eea;">📊 Upload Marks</h3>
                                <p>Enter internal marks</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showCreateAssignment()">
                                <h3 style="color: #667eea;">📝 Create Assignment</h3>
                                <p>Add new assignment</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showStudentList()">
                                <h3 style="color: #667eea;">👥 Student List</h3>
                                <p>View all students</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="showFacultyCompliance()">
                                <h3 style="color: #667eea;">📋 Student Compliance</h3>
                                <p>Calculate compliance %</p>
                            </div>
                            <div style="background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); cursor: pointer;" onclick="submitComplianceReport()">
                                <h3 style="color: #667eea;">📤 Submit Report</h3>
                                <p>Submit compliance report</p>
                            </div>
                        </div>
                        <div id="content"></div>
                    </div>
                </div>
            `;
        }

        async function renderStudentDashboard() {
            const stats = await fetchData('/student/stats');
            const compliance = await fetchData('/student/compliance-report');
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="navbar">
                    <div>🎓 Academic Compliance Portal - Student</div>
                    <div>
                        <span>👨🎓 ${currentUser.name}</span>
                        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
                    </div>
                </div>
                <div class="container">
                    <div class="dashboard">
                        <h2>📚 Student Compliance Dashboard</h2>
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; margin: 20px 0;">
                            <h3>📊 Overall Compliance Status</h3>
                            <div class="stats-grid">
                                <div style="text-align: center;">
                                    <h4>Attendance</h4>
                                    <div style="font-size: 32px; font-weight: bold; color: #667eea;">${compliance.attendancePercentage}%</div>
                                </div>
                                <div style="text-align: center;">
                                    <h4>Internal Marks</h4>
                                    <div style="font-size: 32px; font-weight: bold; color: #667eea;">${compliance.internalMarksAverage}%</div>
                                </div>
                                <div style="text-align: center;">
                                    <h4>Overall Compliance</h4>
                                    <div style="font-size: 32px; font-weight: bold; color: ${compliance.status === 'compliant' ? '#28a745' : '#dc3545'};">${compliance.overallCompliance}%</div>
                                    <span class="badge ${compliance.status === 'compliant' ? 'badge-present' : 'badge-absent'}">${compliance.status.toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-card" onclick="showAttendance()">
                                <h3>📅 Attendance</h3>
                                <div class="stat-number">${stats.attendanceCount || 0}</div>
                            </div>
                            <div class="stat-card" onclick="showMarks()">
                                <h3>📊 Marks</h3>
                                <div class="stat-number">${stats.marksCount || 0}</div>
                            </div>
                            <div class="stat-card" onclick="showAssignments()">
                                <h3>📝 Assignments</h3>
                                <div class="stat-number">${stats.assignmentsCount || 0}</div>
                            </div>
                        </div>
                        <div id="content"></div>
                    </div>
                </div>
            `;
        }

        async function fetchData(endpoint) {
            const res = await fetch(`${API_URL}${endpoint}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            return res.json();
        }

        async function showUsers() {
            const users = await fetchData('/admin/users');
            document.getElementById('content').innerHTML = `
                <h3>All Users</h3>
                <table>
                    <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${users.map(u => `
                            <tr>
                                <td>${u.name}</td>
                                <td>${u.email}</td>
                                <td>${u.role}</td>
                                <td>
                                    <button onclick="editUser('${u._id}', '${u.name}', '${u.email}', '${u.role}')" style="background: #28a745; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px;">✏️ Edit</button>
                                    <button onclick="deleteUser('${u._id}')" style="background: #dc3545; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer;">🗑️ Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showCompliance() {
            const compliance = await fetchData('/admin/compliance');
            document.getElementById('content').innerHTML = `
                <h3>Student Compliance Report</h3>
                <table>
                    <thead><tr><th>Student</th><th>Roll Number</th><th>Attendance %</th><th>Status</th></tr></thead>
                    <tbody>
                        ${compliance.map(c => `
                            <tr>
                                <td>${c.student.userId?.name || 'N/A'}</td>
                                <td>${c.student.rollNumber}</td>
                                <td>${c.percentage.toFixed(2)}%</td>
                                <td><span class="badge ${c.percentage >= 75 ? 'badge-present' : 'badge-absent'}">${c.percentage >= 75 ? 'Compliant' : 'Non-Compliant'}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showStudentCompliance() {
            const compliance = await fetchData('/faculty/compliance');
            document.getElementById('content').innerHTML = `
                <h3>Student Compliance</h3>
                <table>
                    <thead><tr><th>Student</th><th>Roll Number</th><th>Attendance %</th><th>Marks Avg %</th><th>Overall %</th><th>Status</th></tr></thead>
                    <tbody>
                        ${compliance.map(c => `
                            <tr>
                                <td>${c.student.userId?.name || 'N/A'}</td>
                                <td>${c.student.rollNumber}</td>
                                <td>${c.attendancePercentage.toFixed(2)}%</td>
                                <td>${c.marksAverage.toFixed(2)}%</td>
                                <td>${c.overallCompliance.toFixed(2)}%</td>
                                <td><span class="badge ${c.status === 'compliant' ? 'badge-present' : 'badge-absent'}">${c.status.toUpperCase()}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showAttendance() {
            const attendance = await fetchData('/student/attendance');
            document.getElementById('content').innerHTML = `
                <h3>My Attendance</h3>
                <table>
                    <thead><tr><th>Date</th><th>Course</th><th>Status</th></tr></thead>
                    <tbody>
                        ${attendance.map(a => `
                            <tr>
                                <td>${new Date(a.date).toLocaleDateString()}</td>
                                <td>${a.course?.name || 'N/A'}</td>
                                <td><span class="badge badge-${a.status}">${a.status.toUpperCase()}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showMarks() {
            const marks = await fetchData('/student/marks');
            document.getElementById('content').innerHTML = `
                <h3>My Marks</h3>
                <table>
                    <thead><tr><th>Course</th><th>Exam Type</th><th>Marks</th><th>Max Marks</th><th>%</th></tr></thead>
                    <tbody>
                        ${marks.map(m => `
                            <tr>
                                <td>${m.course?.name || 'N/A'}</td>
                                <td>${m.examType}</td>
                                <td>${m.marksObtained}</td>
                                <td>${m.maxMarks}</td>
                                <td>${((m.marksObtained / m.maxMarks) * 100).toFixed(2)}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showAssignments() {
            const assignments = await fetchData('/student/assignments');
            document.getElementById('content').innerHTML = `
                <h3>Assignments</h3>
                <table>
                    <thead><tr><th>Title</th><th>Course</th><th>Due Date</th><th>Max Marks</th></tr></thead>
                    <tbody>
                        ${assignments.map(a => `
                            <tr>
                                <td>${a.title}</td>
                                <td>${a.course?.name || 'N/A'}</td>
                                <td>${new Date(a.dueDate).toLocaleDateString()}</td>
                                <td>${a.maxMarks}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function showAddUser() {
            document.getElementById('content').innerHTML = `
                <h3>➕ Add New User</h3>
                <form onsubmit="addUser(event)" style="max-width: 500px;">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="userName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="userEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="userPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="userRole">
                            <option value="student">Student</option>
                            <option value="faculty">Faculty</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add User</button>
                </form>
            `;
        }

        async function addUser(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                password: document.getElementById('userPassword').value,
                role: document.getElementById('userRole').value
            };
            try {
                const res = await fetch(`${API_URL}/admin/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    alert('User added successfully!');
                    showUsers();
                } else {
                    alert('Error adding user');
                }
            } catch (err) {
                alert('Error adding user');
            }
        }

        async function showDepartments() {
            const departments = await fetchData('/admin/departments');
            document.getElementById('content').innerHTML = `
                <h3>🏢 Departments</h3>
                <table>
                    <thead><tr><th>Department Name</th><th>Code</th></tr></thead>
                    <tbody>
                        ${departments.map(d => `<tr><td>${d.name}</td><td>${d.code}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showCourses() {
            const courses = await fetchData('/admin/courses');
            document.getElementById('content').innerHTML = `
                <h3>📚 Courses</h3>
                <table>
                    <thead><tr><th>Course Name</th><th>Code</th><th>Credits</th><th>Department</th></tr></thead>
                    <tbody>
                        ${courses.map(c => `<tr><td>${c.name}</td><td>${c.code}</td><td>${c.credits}</td><td>${c.department?.name || 'N/A'}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showAllAttendance() {
            const attendance = await fetchData('/admin/attendance');
            document.getElementById('content').innerHTML = `
                <h3>📅 All Attendance Records</h3>
                <table>
                    <thead><tr><th>Date</th><th>Student</th><th>Course</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${attendance.map(a => `
                            <tr>
                                <td>${new Date(a.date).toLocaleDateString()}</td>
                                <td>${a.student?.userId?.name || 'N/A'}</td>
                                <td>${a.course?.name || 'N/A'}</td>
                                <td><span class="badge badge-${a.status}">${a.status.toUpperCase()}</span></td>
                                <td>
                                    <button onclick="editAttendance('${a._id}', '${a.student?._id}', '${a.course?._id}', '${a.date}', '${a.status}')" style="background: #28a745; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px;">✏️ Edit</button>
                                    <button onclick="deleteAttendance('${a._id}')" style="background: #dc3545; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer;">🗑️ Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function showAllMarks() {
            const marks = await fetchData('/admin/marks');
            document.getElementById('content').innerHTML = `
                <h3>📊 All Internal Marks</h3>
                <table>
                    <thead><tr><th>Student</th><th>Course</th><th>Exam Type</th><th>Marks</th><th>%</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${marks.map(m => `
                            <tr>
                                <td>${m.student?.userId?.name || 'N/A'}</td>
                                <td>${m.course?.name || 'N/A'}</td>
                                <td>${m.examType}</td>
                                <td>${m.marksObtained}/${m.maxMarks}</td>
                                <td>${((m.marksObtained / m.maxMarks) * 100).toFixed(2)}%</td>
                                <td>

                        `).join('')}
                    </tbody>

        }

        function downloadComplianceReport() {
            fetchData('/admin/compliance').then(compliance => {
                let csv = 'Student Name,Roll Number,Department,Attendance %,Status\n';
                compliance.forEach(c => {
                    csv += `${c.student.userId?.name || 'N/A'},${c.student.rollNumber},${c.student.department?.name || 'N/A'},${c.percentage.toFixed(2)}%,${c.percentage >= 75 ? 'COMPLIANT' : 'NON-COMPLIANT'}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'compliance_report_' + new Date().toISOString().split('T')[0] + '.csv';
                a.click();
                alert('Compliance report downloaded!');
            });
        }

        function submitComplianceReport() {
            fetchData('/faculty/compliance').then(compliance => {
                const summary = {
                    totalStudents: compliance.length,
                    compliant: compliance.filter(c => c.status === 'compliant').length,
                    nonCompliant: compliance.filter(c => c.status === 'non-compliant').length,
                    date: new Date().toISOString()
                };
                document.getElementById('content').innerHTML = `
                    <h3>📤 Submit Compliance Report</h3>
                    <div style="background: white; padding: 30px; border-radius: 15px; max-width: 600px;">
                        <h4>Report Summary</h4>
                        <p><strong>Total Students:</strong> ${summary.totalStudents}</p>
                        <p><strong>Compliant:</strong> <span style="color: #28a745;">${summary.compliant}</span></p>
                        <p><strong>Non-Compliant:</strong> <span style="color: #dc3545;">${summary.nonCompliant}</span></p>
                        <p><strong>Compliance Rate:</strong> ${((summary.compliant / summary.totalStudents) * 100).toFixed(2)}%</p>
                        <p><strong>Date:</strong> ${new Date().toLocaleDateString()}</p>
                        <button onclick="alert('Compliance report submitted successfully to Admin!')" class="btn-primary">Submit to Admin</button>
                    </div>
                `;
            });
        }
